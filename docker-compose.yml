services:
    jupyter:
        build: .
        container_name: jupyter_datascience
        user: root
        environment:
          - GRANT_SUDO=yes
          - NB_GID=100
          - JUPYTER_ENABLE_LAB=yes
          - CHOWN_HOME=yes
          - CHOWN_HOME_OPTS=-R
        ports:
          - "8888:8888"
        volumes:
          - .:/home/jovyan/work
        command: start-notebook.sh --NotebookApp.token='python'
    
    postgres:
        image: postgres:16
        container_name: crimes_postgres_db
        environment:
          - POSTGRES_USER=admin
          - POSTGRES_PASSWORD=admin
          - POSTGRES_DB=crimes_db
        ports:
          - "5433:5432"
        volumes:
          - postgres_data:/var/lib/postgresql/data
        restart: always
volumes:
  postgres_data:
